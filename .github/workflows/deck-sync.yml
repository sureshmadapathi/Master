name: Kong decK Sync

on:
  push:
    paths:
      - 'kong-konnect-deck/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev/staging/prod)"
        required: true
        default: "dev"

jobs:
  deck-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install decK
        uses: kong/setup-deck@v1
        with:
          deck-version: v1.54.0

      - name: Validate Kong Config
        run: |
          deck validate \
            --konnect-token ${{ secrets.KONNECT_TOKEN }} \
            --konnect-control-plane-name demo-control-plane \
            --state kong-konnect-deck/services \
            --state kong-konnect-deck/routes \
            --state kong-konnect-deck/plugins

      - name: Diff (Preview Changes)
        run: |
          deck diff \
            --konnect-token ${{ secrets.KONNECT_TOKEN }} \
            --konnect-control-plane-name demo-control-plane \
            --state kong-konnect-deck/services \
            --state kong-konnect-deck/routes \
            --state kong-konnect-deck/plugins

      - name: Sync to Konnect
        run: |
          deck sync \
            --konnect-token ${{ secrets.KONNECT_TOKEN }} \
            --konnect-control-plane-name demo-control-plane \
            --state kong-konnect-deck/services \
            --state kong-konnect-deck/routes \
            --state kong-konnect-deck/plugins