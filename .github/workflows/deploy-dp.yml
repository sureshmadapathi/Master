name: Deploy Kong Data Plane

on:
  workflow_dispatch:
  push:
    paths:
      - 'kong-dataplane/**'

jobs:
  deploy-dataplane:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > ~/.kube/config

      - name: Add Kong Helm repo
        run: |
          helm repo add kong https://charts.konghq.com
          helm repo update

      - name: Create Kong namespace
        run: |
          kubectl create namespace kong --dry-run=client -o yaml | kubectl apply -f -

      - name: Create enterprise license secret
        run: |
          kubectl create secret generic kong-enterprise-license \
            --from-literal=license='${{ secrets.KONG_LICENSE }}' \
            --namespace kong \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Get Terraform outputs
        id: tf-outputs
        env:
          TF_VAR_konnect_token: ${{ secrets.KONNECT_TOKEN }}
        run: |
          cd kong-konnect-terraform
          terraform init
          CP_ENDPOINT=$(terraform output -raw control_plane_endpoint)
          TP_ENDPOINT=$(terraform output -raw telemetry_endpoint)
          echo "cp_endpoint=$CP_ENDPOINT" >> $GITHUB_OUTPUT
          echo "tp_endpoint=$TP_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Deploy Kong Data Plane
        run: |
          helm upgrade --install kong kong/kong \
            --namespace kong \
            --values kong-dataplane/values-dp.yaml \
            --set env.cluster_control_plane=${{ steps.tf-outputs.outputs.cp_endpoint }} \
            --set env.cluster_telemetry_endpoint=${{ steps.tf-outputs.outputs.tp_endpoint }} \
            --set env.cluster_server_name=${{ steps.tf-outputs.outputs.cp_endpoint }} \
            --set env.cluster_telemetry_server_name=${{ steps.tf-outputs.outputs.tp_endpoint }}

      - name: Verify Data Plane is Running
        run: |
          kubectl rollout status deployment/kong-kong -n kong --timeout=120s
          kubectl get pods -n kong