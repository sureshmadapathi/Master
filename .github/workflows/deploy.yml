name: Deploy Konnect Control Plane

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev/staging/prod)"
        required: true
        default: "dev"

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kong-konnect-terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
        run: terraform init -upgrade

      - name: Terraform Plan Output
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
          TF_VAR_konnect_token: ${{ secrets.KONNECT_TOKEN }}
          TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var="env=${{ github.event.inputs.environment }}" \
            -out=tfplan

      - name: Show Plan Details
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
        run: terraform show tfplan

      - name: Terraform Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
          TF_VAR_konnect_token: ${{ secrets.KONNECT_TOKEN }}
          TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform apply -auto-approve \
            -var-file="terraform.tfvars" \
            -var="env=${{ github.event.inputs.environment }}"

      - name: Show Control Plane Outputs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
          TF_VAR_konnect_token: ${{ secrets.KONNECT_TOKEN }}
          TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform output

      - name: Save Cluster Cert and Key
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
          TF_VAR_konnect_token: ${{ secrets.KONNECT_TOKEN }}
          TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "=== CLUSTER CERT ==="
          terraform output -raw cluster_cert
          echo ""
          echo "=== CLUSTER KEY ==="
          terraform output -raw cluster_key

      - name: Deploy Kong on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2-key.pem
          chmod 600 /tmp/ec2-key.pem

          terraform output -raw cluster_cert > /tmp/cluster.crt
          terraform output -raw cluster_key > /tmp/cluster.key

          scp -i /tmp/ec2-key.pem \
              -o StrictHostKeyChecking=no \
              /tmp/cluster.crt /tmp/cluster.key \
              ec2-user@$EC2_HOST:~/

          ssh -i /tmp/ec2-key.pem \
              -o StrictHostKeyChecking=no \
              ec2-user@$EC2_HOST << 'EOF'
            docker stop kong-dp || true
            docker rm kong-dp || true

            KONG_LICENSE=$(cat ~/kong-license.json)

            docker run -d \
              --name kong-dp \
              --restart always \
              -p 80:8000 \
              -p 443:8443 \
              -p 8100:8100 \
              -v ~/cluster.crt:/etc/secrets/cluster.crt \
              -v ~/cluster.key:/etc/secrets/cluster.key \
              -e KONG_ROLE=data_plane \
              -e KONG_DATABASE=off \
              -e KONG_KONNECT_MODE=on \
              -e KONG_VITALS=off \
              -e KONG_CLUSTER_MTLS=pki \
              -e KONG_CLUSTER_CONTROL_PLANE=65a85b872c.us.cp.konghq.com:443 \
              -e KONG_CLUSTER_TELEMETRY_ENDPOINT=65a85b872c.us.tp.konghq.com:443 \
              -e KONG_CLUSTER_SERVER_NAME=65a85b872c.us.cp.konghq.com \
              -e KONG_CLUSTER_TELEMETRY_SERVER_NAME=65a85b872c.us.tp.konghq.com \
              -e KONG_CLUSTER_CERT=/etc/secrets/cluster.crt \
              -e KONG_CLUSTER_CERT_KEY=/etc/secrets/cluster.key \
              -e KONG_LUA_SSL_TRUSTED_CERTIFICATE=system \
              -e KONG_STATUS_LISTEN=0.0.0.0:8100 \
              -e KONG_NGINX_WORKER_PROCESSES=1 \
              -e KONG_LICENSE_DATA="$KONG_LICENSE" \
              kong/kong-gateway:3.14
          EOF

      - name: Verify Kong is Running
        run: |
          sleep 30
          ssh -i /tmp/ec2-key.pem \
              -o StrictHostKeyChecking=no \
              ec2-user@${{ secrets.EC2_HOST }} \
              "docker ps | grep kong-dp && curl -s http://localhost:8100/status | python3 -m json.tool | grep -i connected"

      - name: Terraform State List
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
        run: terraform state list