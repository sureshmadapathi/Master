name: Deploy Konnect Vault

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev/staging/prod)"
        required: true
        default: "dev"

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kong-konnect-terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Remove Terraform Lock File
        run: rm -f .terraform.lock.hcl

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Plan Output
        env:
          TF_VAR_konnect_token: ${{ secrets.KONNECT_TOKEN }}
          TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var="env=${{ github.event.inputs.environment }}" \
            -out=tfplan

      - name: Show Plan Details
        run: terraform show tfplan

      - name: Terraform Apply
        env:
          TF_VAR_konnect_token: ${{ secrets.KONNECT_TOKEN }}
          TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform apply -auto-approve \
            -var-file="terraform.tfvars" \
            -var="env=${{ github.event.inputs.environment }}"

      # ✅ ADD THIS STEP HERE — after Terraform Apply
      - name: Create Redis Partial via Kong API
        run: |
          curl -s -X POST \
            "https://us.api.konghq.com/v2/control-planes/2eeeda55-8386-4508-8873-2f74161fff44/core-entities/partials" \
            -H "Authorization: Bearer ${{ secrets.KONNECT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "aws-valkey-redis",
              "type": "redis-ee",
              "config": {
                "host": "host.docker.internal",
                "port": 6379,
                "ssl": true,
                "ssl_verify": false,
                "database": 0,
                "connect_timeout": 2000,
                "read_timeout": 2000,
                "send_timeout": 2000,
                "keepalive_pool_size": 256,
                "keepalive_backlog": 0,
                "connection_is_proxied": false
              }
            }'

      - name: Terraform State List
        run: terraform state list

      - name: Terraform Show Full State
        run: terraform show

      - name: Verify via Kong API
        run: |
          curl -s -X GET \
            "https://us.api.konghq.com/v2/control-planes/2eeeda55-8386-4508-8873-2f74161fff44/core-entities/partials" \
            -H "Authorization: Bearer ${{ secrets.KONNECT_TOKEN }}" \
            -H "Content-Type: application/json" | jq .