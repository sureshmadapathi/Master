_format_version: "3.0"
_konnect:
  control_plane_name: demo-control-plane

plugins:
  - name: rate-limiting-advanced
    enabled: true
    route: flights-route
    tags:
      - flight-bookings
      - rate-limiting
    partials:
      - name: aws-valkey-redis
    config:
      limit:
        - 5
      window_size:
        - 60
      window_type: sliding
      identifier: ip
      strategy: redis
      sync_rate: 0
      namespace: flights-rate-limit