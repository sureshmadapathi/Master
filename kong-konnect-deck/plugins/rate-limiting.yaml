# plugins/rate-limiting.yaml
_format_version: "3.0"
_konnect:
  control_plane_name: demo-control-plane

plugins:
  - name: rate-limiting
    enabled: true
    route: flights-route
    tags:
      - flight-bookings
      - rate-limiting
    config:
      minute: 5
      policy: redis
      redis:
        host: host.docker.internal   # change this one place when Redis changes
        port: 6379
        ssl: false
        ssl_verify: false
        database: 0