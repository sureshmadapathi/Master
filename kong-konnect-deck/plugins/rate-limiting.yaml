_format_version: "3.0"
_konnect:
  control_plane_name: demo-control-plane

plugins:
  - name: rate-limiting
    enabled: true
    route: flights-route
    tags:
      - flight-bookings
      - rate-limiting
    partials:
      - name: aws-valkey-redis
    config:
      minute: 5
      policy: redis
      limit_by: ip
      fault_tolerant: true
      hide_client_headers: false