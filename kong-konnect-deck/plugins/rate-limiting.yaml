_format_version: "3.0"

_konnect:
  control_plane_name: demo-control-plane

plugins:
  - name: rate-limiting-advanced
    enabled: true
    route: flights-route

    tags:
      - flight-bookings
      - rate-limiting

    config:
      identifier: ip

      window_type: fixed

      limit:
        - 5

      window_size:
        - 60

      sync_rate: -1

      strategy: redis

      redis:
        host: suresh-valkey-uzpahi.serverless.aps1.cache.amazonaws.com
        port: 6379

        ssl: true
        ssl_verify: false

        database: 0

      fault_tolerant: false

      hide_client_headers: false