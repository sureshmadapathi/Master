_format_version: "3.0"
_konnect:
  control_plane_name: demo-control-plane

plugins:
  - name: rate-limiting
    enabled: true
    route: flights-route
    tags:
      - flight-bookings
      - rate-limiting
    config:
      minute: 5
      policy: redis
      limit_by: ip                  # ← changed from consumer to ip
      fault_tolerant: false         # ← set false so we see Redis errors if any
      hide_client_headers: false
      redis:
        host: host.docker.internal
        port: 6379
        ssl: true
        ssl_verify: false
        database: 0