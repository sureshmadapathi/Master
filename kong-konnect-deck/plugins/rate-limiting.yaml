_format_version: "3.0"
_konnect:
  control_plane_name: demo-control-plane

plugins:
  - name: rate-limiting-advanced
    enabled: true
    route: flights-route
    tags:
      - flight-bookings
      - rate-limiting
    config:
      limit:
        - 5
      window_size:
        - 60
      limit_by: ip
      strategy: redis
      sync_rate: -1
      redis:
        host: host.docker.internal
        port: 6379
        ssl: false
        ssl_verify: false
        database: 0