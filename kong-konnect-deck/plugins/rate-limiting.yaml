_format_version: "3.0"
_konnect:
  control_plane_name: demo-control-plane

plugins:
  - name: rate-limiting
    enabled: true
    route: flights-route
    tags:
      - flight-bookings
      - rate-limiting
    config:
      minute: 5
      policy: redis
      limit_by: ip
      fault_tolerant: true
      hide_client_headers: false
      redis:
        host: host.docker.internal
        port: 6379
        ssl: true
        ssl_verify: true        # ← must be true when ssl is true
        server_name: suresh-valkey-uzpahi.serverless.aps1.cache.amazonaws.com  # ← add SNI
        database: 0
        timeout: 2000